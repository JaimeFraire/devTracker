<nav>
  <h1><i class="fa-solid fa-code"></i> DevTracker</h1>
  <ul>
    @for (section of sections; track section.id) {
    <li
      (click)="setActive(section.id)"
      [class.active-link]="activeSection === section.id"
    >
      <i [classList]="section.icon"></i> {{ section.name }}
    </li>
    }
  </ul>
</nav>
